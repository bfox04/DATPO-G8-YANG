<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DATPO-G8 — Airfoil Group Controller</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;500;600;700;800;900&family=Rajdhani:wght@400;500;600;700&display=swap');

  :root {
    --bg: #000a00;
    --bg2: #001200;
    --surface: #001a00;
    --surface-glass: rgba(0, 26, 0, 0.75);
    --border: rgba(0, 255, 65, 0.12);
    --border-hover: rgba(0, 255, 65, 0.3);
    --text: #b8ffb8;
    --text-dim: #3d8a3d;
    --text-bright: #e0ffe0;
    --neon: #00ff41;
    --neon-glow: rgba(0, 255, 65, 0.15);
    --neon-strong: rgba(0, 255, 65, 0.3);
    --neon-hot: rgba(0, 255, 65, 0.6);
    --magenta: #ff00ff;
    --magenta-glow: rgba(255, 0, 255, 0.12);
    --magenta-strong: rgba(255, 0, 255, 0.3);
    --cyan: #00ffff;
    --cyan-glow: rgba(0, 255, 255, 0.12);
    --cyan-strong: rgba(0, 255, 255, 0.3);
    --red: #ff003c;
    --red-glow: rgba(255, 0, 60, 0.12);
    --red-strong: rgba(255, 0, 60, 0.35);
    --yellow: #ccff00;
    --yellow-glow: rgba(204, 255, 0, 0.12);
    --yellow-strong: rgba(204, 255, 0, 0.3);
    --radius: 4px;
    --radius-sm: 2px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Rajdhani', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Scanline overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0, 255, 65, 0.015) 2px,
      rgba(0, 255, 65, 0.015) 4px
    );
    pointer-events: none;
    z-index: 100;
  }

  /* Matrix rain grid */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0, 255, 65, 0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0, 255, 65, 0.04) 1px, transparent 1px);
    background-size: 32px 32px;
    pointer-events: none;
    z-index: 0;
  }

  /* Corner glow effects */
  .glow-tl {
    position: fixed; top: -150px; left: -150px;
    width: 400px; height: 400px;
    background: radial-gradient(circle, rgba(0, 255, 65, 0.08) 0%, transparent 70%);
    pointer-events: none; z-index: 0;
  }
  .glow-br {
    position: fixed; bottom: -150px; right: -150px;
    width: 400px; height: 400px;
    background: radial-gradient(circle, rgba(255, 0, 255, 0.05) 0%, transparent 70%);
    pointer-events: none; z-index: 0;
  }

  /* --- HEADER --- */
  .header {
    position: relative; z-index: 1;
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 24px;
    background: var(--surface-glass);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    box-shadow: 0 1px 20px rgba(0, 255, 65, 0.05);
  }

  .header-left { display: flex; align-items: center; gap: 14px; }

  .logo-icon {
    width: 38px; height: 38px;
    border: 2px solid var(--neon);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Orbitron', monospace;
    font-size: 13px; font-weight: 900;
    color: var(--neon);
    box-shadow: 0 0 12px rgba(0, 255, 65, 0.3), inset 0 0 8px rgba(0, 255, 65, 0.1);
    text-shadow: 0 0 8px var(--neon);
    animation: logoPulse 3s ease-in-out infinite;
  }

  @keyframes logoPulse {
    0%, 100% { box-shadow: 0 0 12px rgba(0, 255, 65, 0.3), inset 0 0 8px rgba(0, 255, 65, 0.1); }
    50% { box-shadow: 0 0 24px rgba(0, 255, 65, 0.5), inset 0 0 12px rgba(0, 255, 65, 0.2); }
  }

  .header-title { display: flex; flex-direction: column; gap: 0; }

  .header-title h1 {
    font-family: 'Orbitron', monospace;
    font-size: 14px; font-weight: 800;
    letter-spacing: 2px;
    color: var(--neon);
    text-shadow: 0 0 10px rgba(0, 255, 65, 0.5), 0 0 30px rgba(0, 255, 65, 0.2);
    text-transform: uppercase;
  }

  .header-title span {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px; color: var(--text-dim);
    letter-spacing: 1px; text-transform: uppercase;
  }

  .header-right { display: flex; align-items: center; gap: 12px; }

  .status-pill {
    display: flex; align-items: center; gap: 8px;
    padding: 5px 14px;
    border: 1px solid rgba(255, 0, 60, 0.3);
    background: rgba(255, 0, 60, 0.06);
    transition: all 0.4s;
  }

  .status-pill.connected {
    border-color: rgba(0, 255, 65, 0.3);
    background: rgba(0, 255, 65, 0.06);
  }

  .status-dot {
    width: 6px; height: 6px;
    background: var(--red);
    box-shadow: 0 0 6px var(--red);
    transition: all 0.4s;
  }

  .status-dot.connected {
    background: var(--neon);
    box-shadow: 0 0 8px var(--neon), 0 0 16px rgba(0, 255, 65, 0.3);
    animation: dotBlink 1.5s ease-in-out infinite;
  }

  @keyframes dotBlink {
    0%, 100% { opacity: 1; } 50% { opacity: 0.4; }
  }

  .status-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px; color: var(--text-dim);
    text-transform: uppercase; letter-spacing: 1px;
  }

  .connect-btn {
    padding: 6px 18px;
    border: 1px solid var(--neon);
    background: transparent;
    color: var(--neon);
    font-family: 'Orbitron', monospace;
    font-size: 10px; font-weight: 700;
    cursor: pointer; transition: all 0.2s;
    text-transform: uppercase; letter-spacing: 1px;
    text-shadow: 0 0 6px rgba(0, 255, 65, 0.3);
  }

  .connect-btn:hover {
    background: var(--neon-glow);
    box-shadow: 0 0 20px rgba(0, 255, 65, 0.2);
  }

  .connect-btn.connected { border-color: var(--red); color: var(--red); text-shadow: 0 0 6px rgba(255, 0, 60, 0.3); }
  .connect-btn.connected:hover { background: var(--red-glow); box-shadow: 0 0 20px rgba(255, 0, 60, 0.2); }

  /* --- MAIN --- */
  .main {
    position: relative; z-index: 1;
    display: grid; grid-template-columns: 1fr 380px;
    height: calc(100vh - 63px);
  }

  .controls {
    padding: 20px 24px;
    overflow-y: auto;
    display: flex; flex-direction: column; gap: 16px;
  }

  /* --- CARDS --- */
  .card {
    background: var(--surface-glass);
    backdrop-filter: blur(10px);
    border: 1px solid var(--border);
    padding: 18px;
    transition: all 0.3s;
    animation: glitchIn 0.4s ease both;
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--neon), transparent);
    opacity: 0.4;
  }

  .card:nth-child(1) { animation-delay: 0.05s; }
  .card:nth-child(2) { animation-delay: 0.1s; }
  .card:nth-child(3) { animation-delay: 0.15s; }

  .card:hover { border-color: var(--border-hover); box-shadow: 0 0 15px rgba(0, 255, 65, 0.05); }

  @keyframes glitchIn {
    0% { opacity: 0; transform: translateX(-8px); clip-path: inset(0 100% 0 0); }
    60% { clip-path: inset(0 0 0 0); }
    100% { opacity: 1; transform: translateX(0); }
  }

  .card-title {
    font-family: 'Orbitron', monospace;
    font-size: 10px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 3px;
    margin-bottom: 14px;
    display: flex; align-items: center; gap: 10px;
  }

  .card-title::before {
    content: '//';
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
  }

  .card-title.neon { color: var(--neon); text-shadow: 0 0 8px rgba(0, 255, 65, 0.3); }
  .card-title.neon::before { color: var(--text-dim); }
  .card-title.magenta { color: var(--magenta); text-shadow: 0 0 8px rgba(255, 0, 255, 0.3); }
  .card-title.magenta::before { color: var(--text-dim); }
  .card-title.cyan { color: var(--cyan); text-shadow: 0 0 8px rgba(0, 255, 255, 0.3); }
  .card-title.cyan::before { color: var(--text-dim); }

  /* --- AXIS --- */
  .axis-group { display: flex; flex-direction: column; gap: 8px; }

  .axis-row { display: flex; align-items: center; gap: 8px; }

  .axis-badge {
    width: 44px; height: 34px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Orbitron', monospace;
    font-size: 12px; font-weight: 800;
    flex-shrink: 0;
    border: 1px solid;
    text-shadow: 0 0 6px;
  }

  .axis-badge.x { color: var(--neon); border-color: rgba(0, 255, 65, 0.25); background: rgba(0, 255, 65, 0.06); text-shadow: 0 0 6px var(--neon); }
  .axis-badge.y { color: var(--yellow); border-color: rgba(204, 255, 0, 0.25); background: rgba(204, 255, 0, 0.06); text-shadow: 0 0 6px var(--yellow); }
  .axis-badge.za { color: var(--magenta); border-color: rgba(255, 0, 255, 0.25); background: rgba(255, 0, 255, 0.06); text-shadow: 0 0 6px var(--magenta); }
  .axis-badge.zb { color: var(--cyan); border-color: rgba(0, 255, 255, 0.25); background: rgba(0, 255, 255, 0.06); text-shadow: 0 0 6px var(--cyan); }

  .axis-input {
    flex: 1;
    padding: 8px 12px;
    background: rgba(0, 10, 0, 0.8);
    border: 1px solid var(--border);
    color: var(--neon);
    font-family: 'Share Tech Mono', monospace;
    font-size: 14px;
    outline: none; transition: all 0.2s;
    caret-color: var(--neon);
  }

  .axis-input:focus {
    border-color: var(--neon);
    box-shadow: 0 0 10px rgba(0, 255, 65, 0.1), inset 0 0 6px rgba(0, 255, 65, 0.05);
  }

  .axis-input::placeholder { color: var(--text-dim); }

  .axis-unit {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px; color: var(--text-dim);
    width: 28px; text-align: center;
    text-transform: uppercase; letter-spacing: 1px;
  }

  .axis-send {
    padding: 8px 14px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text);
    font-family: 'Orbitron', monospace;
    font-size: 9px; font-weight: 700;
    cursor: pointer; transition: all 0.2s;
    text-transform: uppercase; letter-spacing: 1px;
  }

  .axis-send:hover {
    border-color: var(--neon); color: var(--neon);
    background: var(--neon-glow);
    box-shadow: 0 0 12px rgba(0, 255, 65, 0.15);
    text-shadow: 0 0 6px var(--neon);
  }

  /* --- ACTIONS --- */
  .action-grid { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 8px; }

  .action-btn {
    padding: 12px 10px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-dim);
    font-family: 'Orbitron', monospace;
    font-size: 9px; font-weight: 600;
    cursor: pointer; transition: all 0.2s;
    text-transform: uppercase; letter-spacing: 1px;
    display: flex; align-items: center; justify-content: center; gap: 6px;
  }

  .action-btn:hover { transform: translateY(-1px); }
  .action-btn .icon { font-size: 14px; }

  .action-btn.home {
    border-color: rgba(0, 255, 255, 0.2); color: var(--cyan);
    text-shadow: 0 0 6px rgba(0, 255, 255, 0.3);
  }
  .action-btn.home:hover { background: var(--cyan-glow); border-color: var(--cyan); box-shadow: 0 0 15px rgba(0, 255, 255, 0.1); }

  .action-btn.status-btn {
    border-color: rgba(255, 0, 255, 0.2); color: var(--magenta);
    text-shadow: 0 0 6px rgba(255, 0, 255, 0.3);
  }
  .action-btn.status-btn:hover { background: var(--magenta-glow); border-color: var(--magenta); box-shadow: 0 0 15px rgba(255, 0, 255, 0.1); }

  .action-btn.fan {
    border-color: rgba(204, 255, 0, 0.2); color: var(--yellow);
    text-shadow: 0 0 6px rgba(204, 255, 0, 0.3);
  }
  .action-btn.fan:hover { background: var(--yellow-glow); border-color: var(--yellow); box-shadow: 0 0 15px rgba(204, 255, 0, 0.1); }

  .action-btn.stop {
    grid-column: 1 / -1;
    border-color: rgba(255, 0, 60, 0.3); color: var(--red);
    font-size: 12px; font-weight: 800;
    padding: 16px; letter-spacing: 3px;
    text-shadow: 0 0 8px rgba(255, 0, 60, 0.4);
    animation: stopFlicker 4s ease-in-out infinite;
  }

  @keyframes stopFlicker {
    0%, 100% { border-color: rgba(255, 0, 60, 0.3); }
    50% { border-color: rgba(255, 0, 60, 0.5); }
  }

  .action-btn.stop:hover {
    background: var(--red);
    color: #000;
    border-color: var(--red);
    box-shadow: 0 0 30px rgba(255, 0, 60, 0.4), 0 0 60px rgba(255, 0, 60, 0.15);
    text-shadow: none;
    animation: none;
  }

  /* --- RAW COMMAND --- */
  .raw-row { display: flex; gap: 8px; }

  .raw-input {
    flex: 1;
    padding: 10px 14px;
    background: rgba(0, 10, 0, 0.8);
    border: 1px solid var(--border);
    color: var(--neon);
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    outline: none; transition: all 0.2s;
    caret-color: var(--neon);
  }

  .raw-input:focus {
    border-color: var(--neon);
    box-shadow: 0 0 10px rgba(0, 255, 65, 0.1);
  }

  .raw-input::placeholder { color: var(--text-dim); }

  .raw-send {
    padding: 10px 22px;
    border: 1px solid var(--neon);
    background: var(--neon);
    color: #000;
    font-family: 'Orbitron', monospace;
    font-size: 10px; font-weight: 800;
    cursor: pointer; transition: all 0.2s;
    text-transform: uppercase; letter-spacing: 1px;
  }

  .raw-send:hover {
    box-shadow: 0 0 20px rgba(0, 255, 65, 0.4), 0 0 40px rgba(0, 255, 65, 0.15);
  }

  /* --- CONSOLE --- */
  .console-panel {
    background: rgba(0, 8, 0, 0.9);
    backdrop-filter: blur(10px);
    border-left: 1px solid var(--border);
    display: flex; flex-direction: column;
  }

  .console-header {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }

  .console-header span {
    font-family: 'Orbitron', monospace;
    font-size: 9px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 3px;
    color: var(--text-dim);
    display: flex; align-items: center; gap: 8px;
  }

  .console-header span::before {
    content: '>';
    color: var(--neon);
    font-size: 12px;
    text-shadow: 0 0 6px var(--neon);
    animation: cursorBlink 1s step-end infinite;
  }

  @keyframes cursorBlink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

  .clear-btn {
    padding: 3px 10px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-dim);
    font-family: 'Orbitron', monospace;
    font-size: 8px; font-weight: 600;
    cursor: pointer; transition: all 0.2s;
    text-transform: uppercase; letter-spacing: 1px;
  }

  .clear-btn:hover { border-color: var(--neon); color: var(--neon); }

  .console-output {
    flex: 1;
    padding: 12px 16px;
    overflow-y: auto;
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    line-height: 1.9;
  }

  .console-line { white-space: pre-wrap; word-break: break-all; padding: 0; }
  .console-line .time { color: var(--text-dim); margin-right: 6px; opacity: 0.6; }
  .console-line .prefix { display: inline-block; width: 14px; text-align: center; }

  .console-line.tx .prefix { color: var(--neon); }
  .console-line.tx .content { color: var(--neon); text-shadow: 0 0 4px rgba(0, 255, 65, 0.2); }
  .console-line.rx .prefix { color: var(--text-dim); }
  .console-line.rx .content { color: var(--text); }
  .console-line.err .prefix { color: var(--red); }
  .console-line.err .content { color: var(--red); text-shadow: 0 0 4px rgba(255, 0, 60, 0.2); }
  .console-line.sys .prefix { color: var(--yellow); }
  .console-line.sys .content { color: var(--yellow); }

  /* --- SCROLLBAR --- */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(0, 255, 65, 0.15); }
  ::-webkit-scrollbar-thumb:hover { background: rgba(0, 255, 65, 0.3); }

  /* --- RESPONSIVE --- */
  @media (max-width: 860px) {
    .main { grid-template-columns: 1fr; grid-template-rows: 1fr 260px; }
    .console-panel { border-left: none; border-top: 1px solid var(--border); }
    .action-grid { grid-template-columns: 1fr 1fr; }
    .action-btn.stop { grid-column: 1 / -1; }
  }
</style>
</head>
<body>
<div class="glow-tl"></div>
<div class="glow-br"></div>

<div class="header">
  <div class="header-left">
    <div class="logo-icon">W</div>
    <div class="header-title">
      <h1>DATPO-G8 // Airfoil Ctrl</h1>
      <span>Wright State Univ • Wind Tunnel Sys • v2.0</span>
    </div>
  </div>
  <div class="header-right">
    <div class="status-pill" id="statusPill">
      <div class="status-dot" id="statusDot"></div>
      <span class="status-label" id="statusText">Offline</span>
    </div>
    <button class="connect-btn" id="connectBtn" onclick="toggleConnection()">Link</button>
  </div>
</div>

<div class="main">
  <div class="controls">
    <div class="card">
      <div class="card-title neon">Axis Control</div>
      <div class="axis-group">
        <div class="axis-row"><div class="axis-badge x">X</div><input class="axis-input" type="number" id="xVal" placeholder="0.0" step="0.1"><span class="axis-unit">mm</span><button class="axis-send" onclick="sendAxis('X','xVal')">Exec</button></div>
        <div class="axis-row"><div class="axis-badge y">Y</div><input class="axis-input" type="number" id="yVal" placeholder="0.0" step="0.1"><span class="axis-unit">mm</span><button class="axis-send" onclick="sendAxis('Y','yVal')">Exec</button></div>
        <div class="axis-row"><div class="axis-badge za">ZA</div><input class="axis-input" type="number" id="zaVal" placeholder="0.0" step="0.1"><span class="axis-unit">deg</span><button class="axis-send" onclick="sendAxis('ZA','zaVal')">Exec</button></div>
        <div class="axis-row"><div class="axis-badge zb">ZB</div><input class="axis-input" type="number" id="zbVal" placeholder="0.0" step="0.1"><span class="axis-unit">deg</span><button class="axis-send" onclick="sendAxis('ZB','zbVal')">Exec</button></div>
      </div>
    </div>

    <div class="card">
      <div class="card-title magenta">Actions</div>
      <div class="action-grid">
        <button class="action-btn home" onclick="sendCmd('HOME')"><span class="icon">⌂</span> Home</button>
        <button class="action-btn status-btn" onclick="sendCmd('STATUS')"><span class="icon">◉</span> Status</button>
        <button class="action-btn status-btn" onclick="sendCmd('OPTIONS')"><span class="icon">☰</span> Options</button>
        <button class="action-btn fan" onclick="sendCmd('FAN')"><span class="icon">⟳</span> Fan</button>
        <button class="action-btn stop" onclick="sendCmd('STOP')">⚠ Emergency Stop</button>
      </div>
    </div>

    <div class="card">
      <div class="card-title cyan">Terminal Input</div>
      <div class="raw-row">
        <input class="raw-input" type="text" id="rawCmd" placeholder="> enter command_" onkeydown="if(event.key==='Enter')sendRaw()">
        <button class="raw-send" onclick="sendRaw()">Run</button>
      </div>
    </div>
  </div>

  <div class="console-panel">
    <div class="console-header"><span>Terminal</span><button class="clear-btn" onclick="clearConsole()">Flush</button></div>
    <div class="console-output" id="consoleOutput"></div>
  </div>
</div>

<script>
let port=null,reader=null,writer=null,readableStreamClosed=null,writableStreamClosed=null,isConnected=false;
const consoleEl=document.getElementById('consoleOutput'),statusDot=document.getElementById('statusDot'),statusText=document.getElementById('statusText'),statusPill=document.getElementById('statusPill'),connectBtn=document.getElementById('connectBtn');

function log(t,c='rx'){const l=document.createElement('div');l.className='console-line '+c;const ts=new Date().toLocaleTimeString('en-US',{hour12:false,hour:'2-digit',minute:'2-digit',second:'2-digit'});const p=c==='tx'?'>':c==='err'?'!':c==='sys'?'*':'<';l.innerHTML=`<span class="time">${ts}</span><span class="prefix">${p}</span> <span class="content">${escapeHtml(t)}</span>`;consoleEl.appendChild(l);consoleEl.scrollTop=consoleEl.scrollHeight}
function escapeHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function clearConsole(){consoleEl.innerHTML='';log('buffer flushed','sys')}
function setConnected(c,l){isConnected=c;statusDot.className='status-dot'+(c?' connected':'');statusPill.className='status-pill'+(c?' connected':'');statusText.textContent=l||(c?'Online':'Offline');connectBtn.textContent=c?'Unlink':'Link';connectBtn.className='connect-btn'+(c?' connected':'')}
async function toggleConnection(){if(isConnected)await disconnect();else await connect()}
async function connect(){try{if(!('serial' in navigator)){log('ERR: Web Serial not supported','err');return}port=await navigator.serial.requestPort();await port.open({baudRate:115200});const d=new TextDecoderStream();readableStreamClosed=port.readable.pipeTo(d.writable);reader=d.readable.getReader();const e=new TextEncoderStream();writableStreamClosed=e.readable.pipeTo(port.writable);writer=e.writable.getWriter();setConnected(true,'Online // 115200');log('link established','sys');readLoop()}catch(e){log('link failed: '+e.message,'err');setConnected(false)}}
async function disconnect(){try{if(reader){await reader.cancel();await readableStreamClosed.catch(()=>{});reader=null}if(writer){await writer.close();await writableStreamClosed.catch(()=>{});writer=null}if(port){await port.close();port=null}setConnected(false);log('link terminated','sys')}catch(e){log('disconnect err: '+e.message,'err');setConnected(false)}}
let lineBuffer='';
async function readLoop(){try{while(true){const{value,done}=await reader.read();if(done)break;if(value){lineBuffer+=value;let lines=lineBuffer.split('\n');lineBuffer=lines.pop();for(const line of lines){const t=line.replace(/\r/g,'').trim();if(t.length>0)log(t,'rx')}}}}catch(e){if(isConnected){log('read err: '+e.message,'err');setConnected(false)}}}
async function sendString(s){if(!isConnected||!writer){log('ERR: no link','err');return}try{await writer.write(s+'\n');log(s,'tx')}catch(e){log('send err: '+e.message,'err')}}
function sendCmd(c){sendString(c)}
function sendAxis(p,id){const v=document.getElementById(id).value;if(v===''||v===null){log('ERR: null input for '+p,'err');return}sendString(p+v)}
function sendRaw(){const i=document.getElementById('rawCmd');const c=i.value.trim();if(!c.length)return;sendString(c);i.value=''}
window.addEventListener('beforeunload',()=>{if(isConnected)disconnect()});
</script>
