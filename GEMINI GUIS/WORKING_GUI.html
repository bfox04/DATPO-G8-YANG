<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DATPO-G8 — Airfoil Group Controller</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Fira+Code:wght@400;500;600&display=swap');
:root {
  /* Background Colors */
  --bg-deep: #080c18;
  --bg: #0d1424;
  --surface: #131b30;
  --surface-glass: rgba(19, 27, 48, 0.7);

  /* Borders */
  --border: rgba(255, 255, 255, 0.06);
  --border-hover: rgba(255, 255, 255, 0.12);

  /* Typography */
  --text: #e2e8f0;
  --text-dim: #64748b;
  --text-muted: #475569;

  /* Accent: Teal */
  --teal: #2dd4bf;
  --teal-glow: rgba(45, 212, 191, 0.15);
  --teal-strong: rgba(45, 212, 191, 0.3);

  /* Accent: Amber */
  --amber: #fbbf24;
  --amber-glow: rgba(251, 191, 36, 0.12);
  --amber-strong: rgba(251, 191, 36, 0.25);

  /* Accent: Rose */
  --rose: #fb7185;
  --rose-glow: rgba(251, 113, 133, 0.12);
  --rose-strong: rgba(251, 113, 133, 0.3);

  /* Accent: Sky */
  --sky: #38bdf8;
  --sky-glow: rgba(56, 189, 248, 0.12);

  /* Accent: Violet */
  --violet: #a78bfa;
  --violet-glow: rgba(167, 139, 250, 0.12);

  /* Geometry */
  --radius: 12px;
  --radius-sm: 8px;
}

  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Outfit',sans-serif;background:var(--bg-deep);color:var(--text);height:100vh;overflow:hidden;display:flex;flex-direction:column}
  
  body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(45,212,191,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(45,212,191,0.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0}
  body::after{content:'';position:fixed;top:-200px;right:-200px;width:600px;height:600px;background:radial-gradient(circle,rgba(45,212,191,0.06) 0%,transparent 70%);pointer-events:none;z-index:0}
  
  .header{position:relative;z-index:1;display:flex;align-items:center;justify-content:space-between;padding:14px 28px;background:var(--surface-glass);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);flex-shrink:0}
  .header-left{display:flex;align-items:center;gap:14px}
  .logo-icon{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,#2dd4bf,#14b8a6);display:flex;align-items:center;justify-content:center;font-family:'Fira Code',monospace;font-size:14px;font-weight:700;color:var(--bg-deep);box-shadow:0 0 20px rgba(45,212,191,0.2)}
  .header-title{display:flex;flex-direction:column;gap:1px}
  .header-title h1{font-size:15px;font-weight:700;letter-spacing:.5px;background:linear-gradient(135deg,var(--teal),var(--amber));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
  .header-title span{font-size:11px;color:var(--text-dim);font-weight:400}
  .header-right{display:flex;align-items:center;gap:12px}
  
  .status-pill{display:flex;align-items:center;gap:8px;padding:6px 14px;border-radius:20px;background:rgba(251,113,133,0.08);border:1px solid rgba(251,113,133,0.15);transition:all .4s ease}
  .status-pill.connected{background:rgba(45,212,191,0.08);border-color:rgba(45,212,191,0.2)}
  .status-dot{width:7px;height:7px;border-radius:50%;background:var(--rose);transition:all .4s}
  .status-dot.connected{background:var(--teal);box-shadow:0 0 10px rgba(45,212,191,0.5);animation:pulse 2s infinite}
  
  @keyframes pulse{0%,100%{box-shadow:0 0 10px rgba(45,212,191,0.5)}50%{box-shadow:0 0 18px rgba(45,212,191,0.8)}}
  .status-label{font-family:'Fira Code',monospace;font-size:11px;font-weight:500;color:var(--text-dim)}
  .connect-btn{padding:7px 18px;border-radius:8px;border:1px solid var(--teal);background:var(--teal-glow);color:var(--teal);font-family:'Outfit',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:all .25s;letter-spacing:.3px}
  .connect-btn:hover{background:var(--teal-strong);box-shadow:0 0 20px rgba(45,212,191,0.15)}
  .connect-btn.connected{border-color:var(--rose);background:var(--rose-glow);color:var(--rose)}
  
  .main{position:relative;z-index:1;display:grid;grid-template-columns:1fr 400px;flex:1;overflow:hidden}
  .controls{padding:24px;overflow-y:auto;display:flex;flex-direction:column;gap:20px}
  
  .card{background:var(--surface-glass);backdrop-filter:blur(16px);border:1px solid var(--border);border-radius:var(--radius);padding:20px;transition:border-color .3s;animation:fadeUp .5s ease both}
  .card:nth-child(1){animation-delay:.05s}.card:nth-child(2){animation-delay:.1s}.card:nth-child(3){animation-delay:.15s}
  .card:hover{border-color:var(--border-hover)}
  @keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
  
  .card-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:var(--text-muted);margin-bottom:16px;display:flex;align-items:center;gap:8px}
  .card-title::before{content:'';width:3px;height:14px;border-radius:2px}
  .card-title.teal::before{background:linear-gradient(135deg,#2dd4bf,#14b8a6)}.card-title.amber::before{background:linear-gradient(135deg,#fbbf24,#f59e0b)}.card-title.rose::before{background:linear-gradient(135deg,#fb7185,#f43f5e)}.card-title.sky::before{background:var(--sky)}
  
  .axis-group{display:flex;flex-direction:column;gap:10px}
  .axis-row{display:flex;align-items:center;gap:10px}
  .axis-badge{width:42px;height:36px;display:flex;align-items:center;justify-content:center;border-radius:var(--radius-sm);font-family:'Fira Code',monospace;font-size:13px;font-weight:700;flex-shrink:0}
  .axis-badge.x{background:var(--teal-glow);color:var(--teal);border:1px solid rgba(45,212,191,0.15)}.axis-badge.y{background:var(--amber-glow);color:var(--amber);border:1px solid rgba(251,191,36,0.15)}.axis-badge.za{background:var(--violet-glow);color:var(--violet);border:1px solid rgba(167,139,250,0.15)}.axis-badge.zb{background:var(--sky-glow);color:var(--sky);border:1px solid rgba(56,189,248,0.15)}
  
  .axis-input{flex:1;padding:9px 14px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-family:'Fira Code',monospace;font-size:14px;outline:none;transition:all .2s}
  .axis-input:focus{border-color:rgba(255,255,255,0.15);box-shadow:0 0 0 3px rgba(45,212,191,0.08)}
  .axis-input::placeholder{color:var(--text-muted)}
  .axis-unit{font-family:'Fira Code',monospace;font-size:11px;color:var(--text-muted);width:28px;text-align:center}
  .axis-send{padding:9px 16px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--surface);color:var(--text);font-family:'Outfit',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:all .2s}
  .axis-send:hover{border-color:var(--teal);color:var(--teal);background:var(--teal-glow)}
  
  .action-grid{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:10px}
  .action-btn{padding:14px 16px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--surface);color:var(--text-dim);font-family:'Outfit',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px}
  .action-btn:hover{border-color:var(--border-hover);color:var(--text);transform:translateY(-1px)}
  .action-btn.home{border-color:rgba(56,189,248,0.15);color:var(--sky);background:var(--sky-glow)}.action-btn.home:hover{border-color:var(--sky);box-shadow:0 0 15px rgba(56,189,248,0.1)}
  .action-btn.fan{border-color:rgba(251,191,36,0.15);color:var(--amber);background:var(--amber-glow)}.action-btn.fan:hover{border-color:var(--amber);box-shadow:0 0 15px rgba(251,191,36,0.1)}
  .action-btn.status-btn{border-color:rgba(167,139,250,0.15);color:var(--violet);background:var(--violet-glow)}.action-btn.status-btn:hover{border-color:var(--violet);box-shadow:0 0 15px rgba(167,139,250,0.1)}
  .action-btn.stop{grid-column:1/-1;border-color:rgba(251,113,133,0.2);color:var(--rose);background:var(--rose-glow);font-size:15px;font-weight:700;padding:18px;letter-spacing:1px;text-transform:uppercase}
  .action-btn.stop:hover{background:var(--rose);color:#fff;border-color:var(--rose);box-shadow:0 0 30px rgba(251,113,133,0.25);transform:translateY(-1px)}
  
  .raw-row{display:flex;gap:10px}
  .raw-input{flex:1;padding:11px 14px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-family:'Fira Code',monospace;font-size:13px;outline:none;transition:all .2s}
  .raw-send{padding:11px 24px;border-radius:var(--radius-sm);border:none;background:linear-gradient(135deg,#2dd4bf,#14b8a6);color:var(--bg-deep);font-family:'Outfit',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;letter-spacing:.3px}
  
  .console-panel{background:var(--surface-glass);backdrop-filter:blur(16px);border-left:1px solid var(--border);display:flex;flex-direction:column;height:100%;overflow:hidden}
  .console-header{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
  .console-header span{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:var(--text-muted);display:flex;align-items:center;gap:8px}
  .console-header span::before{content:'';width:3px;height:14px;border-radius:2px;background:linear-gradient(135deg,#2dd4bf,#14b8a6)}
  .clear-btn{padding:4px 12px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--text-muted);font-family:'Outfit',sans-serif;font-size:10px;font-weight:600;cursor:pointer;transition:all .2s;text-transform:uppercase;letter-spacing:.5px}
  
  .console-output{flex:1;padding:14px 18px;overflow-y:auto;font-family:'Fira Code',monospace;font-size:11.5px;line-height:1.8;display:flex;flex-direction:column}
  .console-line{white-space:pre-wrap;word-break:break-all;padding:1px 0;flex-shrink:0}
  .console-line .time{color:var(--text-muted);margin-right:6px}
  .console-line.tx .content{color:var(--teal)}.console-line.rx .content{color:var(--text-dim)}.console-line.err .content{color:var(--rose)}.console-line.sys .content{color:var(--amber)}
  
  ::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}::-webkit-scrollbar-thumb:hover{background:var(--text-muted)}
  
  @media(max-width:860px){
    body{overflow:auto;height:auto}
    .main{grid-template-columns:1fr;display:block;height:auto;overflow:visible}
    .console-panel{height:400px;border-left:none;border-top:1px solid var(--border)}
    .action-grid{grid-template-columns:1fr 1fr}.action-btn.stop{grid-column:1/-1}
  }
</style>
</head>
<body>
<div class="header">
  <div class="header-left">
    <div class="logo-icon">W</div>
    <div class="header-title">
      <h1>DATPO-G8 Airfoil Controller</h1>
      <span>Wright State University — Wind Tunnel System</span>
    </div>
  </div>
  <div class="header-right">
    <div class="status-pill" id="statusPill">
      <div class="status-dot" id="statusDot"></div>
      <span class="status-label" id="statusText">Disconnected</span>
    </div>
    <button class="connect-btn" id="connectBtn" onclick="toggleConnection()">Connect</button>
  </div>
</div>
<div class="main">
  <div class="controls">
    <div class="card">
      <div class="card-title teal">Axis Control</div>
      <div class="axis-group">
        <div class="axis-row"><div class="axis-badge x">X</div><input class="axis-input" type="number" id="xVal" placeholder="0.0" step="0.1" onkeydown="handleAxisEnter(event, 'X', 'xVal')"><span class="axis-unit">mm</span><button class="axis-send" onclick="sendAxis('X','xVal')">Send</button></div>
        <div class="axis-row"><div class="axis-badge y">Y</div><input class="axis-input" type="number" id="yVal" placeholder="0.0" step="0.1" onkeydown="handleAxisEnter(event, 'Y', 'yVal')"><span class="axis-unit">mm</span><button class="axis-send" onclick="sendAxis('Y','yVal')">Send</button></div>
        <div class="axis-row"><div class="axis-badge za">ZA</div><input class="axis-input" type="number" id="zaVal" placeholder="0.0" step="0.1" onkeydown="handleAxisEnter(event, 'ZA', 'zaVal')"><span class="axis-unit">deg</span><button class="axis-send" onclick="sendAxis('ZA','zaVal')">Send</button></div>
        <div class="axis-row"><div class="axis-badge zb">ZB</div><input class="axis-input" type="number" id="zbVal" placeholder="0.0" step="0.1" onkeydown="handleAxisEnter(event, 'ZB', 'zbVal')"><span class="axis-unit">deg</span><button class="axis-send" onclick="sendAxis('ZB','zbVal')">Send</button></div>
      </div>
    </div>
    <div class="card">
      <div class="card-title amber">Actions</div>
      <div class="action-grid">
        <button class="action-btn home" onclick="sendCmd('HOME')"><span class="icon">⌂</span> Home All</button>
        <button class="action-btn status-btn" onclick="sendCmd('STATUS')"><span class="icon">◉</span> Status</button>
        <button class="action-btn status-btn" onclick="sendCmd('OPTIONS')"><span class="icon">☰</span> Options</button>
        <button class="action-btn fan" onclick="sendCmd('FAN')"><span class="icon">⟳</span> Fan</button>
        <button class="action-btn stop" onclick="sendCmd('STOP')">⚠ Emergency Stop</button>
      </div>
    </div>
    <div class="card">
      <div class="card-title sky">Raw Command</div>
      <div class="raw-row">
        <input class="raw-input" type="text" id="rawCmd" placeholder="Type any command..." onkeydown="if(event.key==='Enter')sendRaw()">
        <button class="raw-send" onclick="sendRaw()">Send</button>
      </div>
    </div>
  </div>
  <div class="console-panel">
    <div class="console-header"><span>Serial Console</span><button class="clear-btn" onclick="clearConsole()">Clear</button></div>
    <div class="console-output" id="consoleOutput"></div>
  </div>
</div>
<script>
let port=null,reader=null,writer=null,readableStreamClosed=null,writableStreamClosed=null,isConnected=false;
const consoleEl=document.getElementById('consoleOutput'),statusDot=document.getElementById('statusDot'),statusText=document.getElementById('statusText'),statusPill=document.getElementById('statusPill'),connectBtn=document.getElementById('connectBtn');
function log(t,c='rx'){const l=document.createElement('div');l.className='console-line '+c;const ts=new Date().toLocaleTimeString('en-US',{hour12:false,hour:'2-digit',minute:'2-digit',second:'2-digit'});const p=c==='tx'?'›':c==='err'?'✗':c==='sys'?'●':'‹';l.innerHTML=`<span class="time">${ts}</span><span class="prefix">${p}</span> <span class="content">${escapeHtml(t)}</span>`;consoleEl.appendChild(l);consoleEl.scrollTop=consoleEl.scrollHeight}
function escapeHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function clearConsole(){consoleEl.innerHTML='';log('Console cleared','sys')}
function setConnected(c,l){isConnected=c;statusDot.className='status-dot'+(c?' connected':'');statusPill.className='status-pill'+(c?' connected':'');statusText.textContent=l||(c?'Connected':'Disconnected');connectBtn.textContent=c?'Disconnect':'Connect';connectBtn.className='connect-btn'+(c?' connected':'')}
async function toggleConnection(){if(isConnected)await disconnect();else await connect()}
async function connect(){try{if(!('serial' in navigator)){log('Web Serial not supported — use Chrome or Edge','err');return}port=await navigator.serial.requestPort();await port.open({baudRate:115200});const d=new TextDecoderStream();readableStreamClosed=port.readable.pipeTo(d.writable);reader=d.readable.getReader();const e=new TextEncoderStream();writableStreamClosed=e.readable.pipeTo(port.writable);writer=e.writable.getWriter();setConnected(true,'Connected · 115200');log('Port opened','sys');readLoop()}catch(e){log('Connection failed: '+e.message,'err');setConnected(false)}}
async function disconnect(){try{if(reader){await reader.cancel();await readableStreamClosed.catch(()=>{});reader=null}if(writer){await writer.close();await writableStreamClosed.catch(()=>{});writer=null}if(port){await port.close();port=null}setConnected(false);log('Disconnected','sys')}catch(e){log('Disconnect error: '+e.message,'err');setConnected(false)}}
let lineBuffer='';
async function readLoop(){try{while(true){const{value,done}=await reader.read();if(done)break;if(value){lineBuffer+=value;let lines=lineBuffer.split('\n');lineBuffer=lines.pop();for(const line of lines){const t=line.replace(/\r/g,'').trim();if(t.length>0)log(t,'rx')}}}}catch(e){if(isConnected){log('Read error: '+e.message,'err');setConnected(false)}}}
async function sendString(s){if(!isConnected||!writer){log('Not connected','err');return}try{await writer.write(s+'\n');log(s,'tx')}catch(e){log('Send error: '+e.message,'err')}}
function sendCmd(c){sendString(c)}
function sendAxis(p,id){const v=document.getElementById(id).value;if(v===''||v===null){log('Enter a value for '+p,'err');return}sendString(p+v)}
function handleAxisEnter(event, p, id) { if(event.key === 'Enter') sendAxis(p, id); }
function sendRaw(){const i=document.getElementById('rawCmd');const c=i.value.trim();if(!c.length)return;sendString(c);i.value=''}
window.addEventListener('beforeunload',()=>{if(isConnected)disconnect()});
</script>
</body>
</html>
