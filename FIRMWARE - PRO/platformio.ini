; PlatformIO Project Configuration File
; Target Board : BIGTREETECH Octopus Pro V1.1 — STM32H723ZET6
; Converted from : BTT Octopus V1.1 (non-Pro, STM32F446ZET6)
;
; CHANGE LOG vs original:
;   board = btt_octopus_pro   <-- was: btt_octopus
;   (All other settings are unchanged and compatible with the Pro.)
;
; The btt_octopus_pro board definition targets the same
; STM32F446ZET6 MCU, 12 MHz crystal, and pin map.
; If your PlatformIO platform (ststm32) does not yet include
; btt_octopus_pro as a built-in board ID, you can either:
;   (a) Update the ststm32 platform:  pio pkg update
;   (b) Or keep board = btt_octopus — the MCU, flash layout,
;       and GPIO are identical; the only functional difference
;       is the Pro's extra HV motor power rail and fan voltage
;       jumpers, which are hardware-only and need no firmware change.

[env:btt_octopus_pro]
platform = ststm32
board = btt_octopus_pro_h723
framework = arduino
board_build.variants_dir = custom_variants
upload_protocol = stlink
debug_tool = stlink
lib_deps =
    waspinator/AccelStepper@^1.64
    olikraus/U8g2@^2.36.17
build_flags =
    -D HSE_VALUE=25000000U
    -D PIO_FRAMEWORK_ARDUINO_ENABLE_CDC
    -D HAL_QSPI_MODULE_DISABLED
    -D ARDUINO_BTT_OCTOPUS_PRO_H723
    -D USE_USB_HS
    -D USE_USB_HS_IN_FS
